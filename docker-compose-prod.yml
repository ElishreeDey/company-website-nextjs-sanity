# Production overrides — layered on top of docker-compose.yml, not a standalone file:

services:
  web:
    ports:
      - "3000:3000"
    restart: unless-stopped
    
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
